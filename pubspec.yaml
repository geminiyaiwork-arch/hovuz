name: hovuz
description: "Hovuz - Crypto Transaction & Wallet Inspector"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  window_manager: ^0.4.2
  shared_preferences: ^2.3.2
  excel: ^4.0.6
  file_selector: ^1.0.3
  path_provider: ^2.1.4
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - images/logo.png
    - images/avatar.jpg
